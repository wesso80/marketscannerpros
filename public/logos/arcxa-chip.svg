<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Outer glow -->
  <defs>
    <radialGradient id="chipGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chipFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
  </defs>

  <!-- Glow backdrop -->
  <circle cx="60" cy="60" r="58" fill="url(#chipGlow)"/>

  <!-- Chip pins — top -->
  <rect x="30" y="16" width="3" height="10" rx="1" fill="url(#pinGrad)"/>
  <rect x="40" y="16" width="3" height="10" rx="1" fill="url(#pinGrad)"/>
  <rect x="50" y="16" width="3" height="10" rx="1" fill="url(#pinGrad)"/>
  <rect x="60" y="16" width="3" height="10" rx="1" fill="url(#pinGrad)"/>
  <rect x="70" y="16" width="3" height="10" rx="1" fill="url(#pinGrad)"/>
  <rect x="80" y="16" width="3" height="10" rx="1" fill="url(#pinGrad)"/>

  <!-- Chip pins — bottom -->
  <rect x="30" y="94" width="3" height="10" rx="1" fill="url(#pinGrad)"/>
  <rect x="40" y="94" width="3" height="10" rx="1" fill="url(#pinGrad)"/>
  <rect x="50" y="94" width="3" height="10" rx="1" fill="url(#pinGrad)"/>
  <rect x="60" y="94" width="3" height="10" rx="1" fill="url(#pinGrad)"/>
  <rect x="70" y="94" width="3" height="10" rx="1" fill="url(#pinGrad)"/>
  <rect x="80" y="94" width="3" height="10" rx="1" fill="url(#pinGrad)"/>

  <!-- Chip pins — left -->
  <rect x="16" y="30" width="10" height="3" rx="1" fill="url(#pinGrad)"/>
  <rect x="16" y="40" width="10" height="3" rx="1" fill="url(#pinGrad)"/>
  <rect x="16" y="50" width="10" height="3" rx="1" fill="url(#pinGrad)"/>
  <rect x="16" y="60" width="10" height="3" rx="1" fill="url(#pinGrad)"/>
  <rect x="16" y="70" width="10" height="3" rx="1" fill="url(#pinGrad)"/>
  <rect x="16" y="80" width="10" height="3" rx="1" fill="url(#pinGrad)"/>

  <!-- Chip pins — right -->
  <rect x="94" y="30" width="10" height="3" rx="1" fill="url(#pinGrad)"/>
  <rect x="94" y="40" width="10" height="3" rx="1" fill="url(#pinGrad)"/>
  <rect x="94" y="50" width="10" height="3" rx="1" fill="url(#pinGrad)"/>
  <rect x="94" y="60" width="10" height="3" rx="1" fill="url(#pinGrad)"/>
  <rect x="94" y="70" width="10" height="3" rx="1" fill="url(#pinGrad)"/>
  <rect x="94" y="80" width="10" height="3" rx="1" fill="url(#pinGrad)"/>

  <!-- Chip body -->
  <rect x="26" y="26" width="68" height="68" rx="6" fill="url(#chipFace)" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Inner border glow -->
  <rect x="30" y="30" width="60" height="60" rx="4" fill="none" stroke="#ef4444" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- ARCxA text -->
  <text x="60" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#ef4444" letter-spacing="1.5">ARCxA</text>

  <!-- Corner indicator dots -->
  <circle cx="34" cy="34" r="2" fill="#ef4444" opacity="0.7"/>
  <circle cx="86" cy="86" r="1.5" fill="#ef4444" opacity="0.4"/>
</svg>
