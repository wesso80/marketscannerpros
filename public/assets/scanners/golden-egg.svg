<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" fill="none">
  <defs>
    <radialGradient id="glow-amber" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#F59E0B" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="egg-shine" cx="40%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="600" fill="#0A101C"/>
  <circle cx="450" cy="280" r="300" fill="url(#glow-amber)"/>
  <!-- Grid -->
  <g stroke="#F59E0B" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="100" x2="900" y2="100"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/><line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="600"/><line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="450" y1="0" x2="450" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <!-- Orbital rings -->
  <ellipse cx="450" cy="290" rx="220" ry="80" stroke="#F59E0B" stroke-opacity="0.15" stroke-width="1" fill="none" transform="rotate(-15 450 290)"/>
  <ellipse cx="450" cy="290" rx="180" ry="65" stroke="#FBBF24" stroke-opacity="0.1" stroke-width="1" fill="none" transform="rotate(20 450 290)"/>
  <ellipse cx="450" cy="290" rx="240" ry="90" stroke="#F59E0B" stroke-opacity="0.08" stroke-width="1" fill="none" transform="rotate(-5 450 290)"/>
  <!-- The Golden Egg -->
  <ellipse cx="450" cy="270" rx="75" ry="100" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-opacity="0.5" stroke-width="2"/>
  <ellipse cx="450" cy="270" rx="75" ry="100" fill="url(#egg-shine)"/>
  <ellipse cx="450" cy="270" rx="70" ry="95" stroke="#FBBF24" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  <!-- Inner glow -->
  <ellipse cx="435" cy="245" rx="25" ry="35" fill="#FDE68A" fill-opacity="0.2"/>
  <!-- Evidence layers (orbiting dots) -->
  <circle cx="280" cy="250" r="4" fill="#F59E0B" opacity="0.7"/>
  <circle cx="620" cy="310" r="3" fill="#FBBF24" opacity="0.6"/>
  <circle cx="350" cy="370" r="5" fill="#F59E0B" opacity="0.5"/>
  <circle cx="550" cy="200" r="3" fill="#FDE68A" opacity="0.5"/>
  <circle cx="310" cy="320" r="3" fill="#FBBF24" opacity="0.4"/>
  <circle cx="590" cy="240" r="4" fill="#F59E0B" opacity="0.6"/>
  <!-- Connection lines to egg -->
  <line x1="280" y1="250" x2="380" y2="265" stroke="#F59E0B" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="620" y1="310" x2="525" y2="285" stroke="#F59E0B" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="350" y1="370" x2="420" y2="340" stroke="#F59E0B" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="550" y1="200" x2="490" y2="230" stroke="#F59E0B" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Score badge -->
  <rect x="415" y="400" width="70" height="28" rx="14" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-opacity="0.4"/>
  <text x="450" y="419" text-anchor="middle" fill="#FBBF24" font-family="monospace" font-size="13" font-weight="bold">96%</text>
  <text x="450" y="510" text-anchor="middle" fill="#F59E0B" font-family="monospace" font-size="18" font-weight="bold" opacity="0.6">GOLDEN EGG</text>
  <text x="450" y="535" text-anchor="middle" fill="#94A3B8" font-family="monospace" font-size="12" opacity="0.5">Conviction · Evidence · Narrative Alignment</text>
</svg>