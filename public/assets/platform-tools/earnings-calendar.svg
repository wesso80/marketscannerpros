<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs><radialGradient id="g" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#F59E0B" stop-opacity="0.2"/><stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/></radialGradient></defs>
  <rect width="512" height="512" rx="32" fill="#0A101C"/><circle cx="256" cy="240" r="180" fill="url(#g)"/>
  <!-- Calendar -->
  <rect x="160" y="130" width="192" height="200" rx="10" fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-width="2.5"/>
  <!-- Calendar header -->
  <rect x="160" y="130" width="192" height="45" rx="10" fill="#F59E0B" fill-opacity="0.12"/>
  <!-- Calendar hooks -->
  <line x1="210" y1="118" x2="210" y2="142" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="302" y1="118" x2="302" y2="142" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Grid lines -->
  <line x1="160" y1="210" x2="352" y2="210" stroke="#F59E0B" stroke-width="1" opacity="0.15"/>
  <line x1="160" y1="250" x2="352" y2="250" stroke="#F59E0B" stroke-width="1" opacity="0.15"/>
  <line x1="160" y1="290" x2="352" y2="290" stroke="#F59E0B" stroke-width="1" opacity="0.15"/>
  <!-- Dollar sign in center cell -->
  <text x="256" y="270" text-anchor="middle" fill="#F59E0B" font-family="monospace" font-size="48" font-weight="bold" opacity="0.5">$</text>
  <!-- Highlighted day -->
  <rect x="232" y="245" width="48" height="35" rx="4" stroke="#F59E0B" stroke-width="1.5" fill="#F59E0B" fill-opacity="0.1"/>
  <text x="256" y="440" text-anchor="middle" fill="#F59E0B" font-family="monospace" font-size="16" font-weight="bold" opacity="0.5">EARNINGS CALENDAR</text>
</svg>