  <circle cx="150" cy="134" r="4" fill="#EF4444" opacity="0.5"/>
  <circle cx="166" cy="134" r="4" fill="#F59E0B" opacity="0.5"/>
  <circle cx="182" cy="134" r="4" fill="#22C55E" opacity="0.5"/>
