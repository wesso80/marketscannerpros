<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, follow" />
  <meta http-equiv="refresh" content="0; url=/tools" />
  <title>MarketScanner Pros Tools</title>
  <meta
    name="description"
    content="This legacy preview has moved to the MarketScanner Pros tools hub for educational market research workflows."
  />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --border: #263244;
      --accent: #10b981;
      --text: #e5e7eb;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
    }

    main {
      width: min(100%, 560px);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 24px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      margin-top: 18px;
      border: 1px solid rgba(16, 185, 129, 0.38);
      border-radius: 8px;
      background: rgba(16, 185, 129, 0.1);
      color: #a7f3d0;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Tools Preview Moved</h1>
    <p>
      This legacy preview has been retired. The current MarketScanner Pros tools hub is the source of truth for educational market research workflows, tool access, and tier information.
    </p>
    <a href="/tools">Open Tools Hub</a>
  </main>
</body>
</html>
